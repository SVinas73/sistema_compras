name: Generar orden de compra

# Se ejecuta con un botón manual desde la pestaña "Actions" de GitHub.
on:
  workflow_dispatch:

# Necesario para que la corrida pueda guardar su memoria (historial de
# predicciones y orden) de vuelta en el repositorio.
permissions:
  contents: write

jobs:
  reposicion:
    runs-on: ubuntu-latest
    steps:
      - name: Traer el código y los datos
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el modelo (genera la orden de compra)
        run: python main.py

      - name: Publicar la orden de compra descargable
        uses: actions/upload-artifact@v4
        with:
          name: orden_de_compra
          path: data/processed/orden_de_compra.csv

      # El servidor de Actions se destruye al terminar: si no se commitea,
      # el historial de predicciones (la memoria del boletín de aprendizaje)
      # se perdería. Se guarda solo lo liviano: orden + historial.
      - name: Guardar orden e historial en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/orden_de_compra.csv data/processed/historial
          git diff --cached --quiet || { git commit -m "Registro de corrida: orden de compra + snapshot de predicciones"; git push; }
